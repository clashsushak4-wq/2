version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: trading_bot_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bot123}
      POSTGRES_DB: ${POSTGRES_DB:-trading_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trading_bot_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    container_name: trading_bot
    env_file:
      - ../.env
    volumes:
      - ../bot:/app/bot
      - ../shared:/app/shared
      - ../logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: python -m bot.main

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: trading_backend
    env_file:
      - ../.env
    volumes:
      - ../backend:/app/backend
      - ../shared:/app/shared
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  # webapp: TODO — создать webapp/Dockerfile перед использованием
  # webapp:
  #   build:
  #     context: ../webapp
  #     dockerfile: Dockerfile
  #   container_name: trading_webapp
  #   ports:
  #     - "5173:5173"
  #   command: npm run dev -- --host

volumes:
  postgres_data:
