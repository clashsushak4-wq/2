[pytest]
# Путь к тестам
testpaths = tests

# Паттерн для поиска тестов
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Маркеры
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (with database)
    slow: Slow tests (skip with -m "not slow")

# Асинхронность
asyncio_mode = auto

# Вывод
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Покрытие (если используется pytest-cov)
[coverage:run]
source = .
omit = 
    tests/*
    venv/*
    */migrations/*
    */versions/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
