name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build WebApp
        run: |
          cd webapp
          npm ci || npm install
          npm run build

      - name: Build Admin Panel
        run: |
          cd admin
          npm ci || npm install
          npm run build

      - name: Copy Frontend (dist) to Server via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "webapp/dist/,admin/dist/"
          target: "/home/ubuntu/bot/"
          strip_components: 0

      - name: Pull Backend/Bot updates and Restart Docker via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/bot
            git pull origin main
            cd docker
            docker-compose up -d --build
